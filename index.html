
 
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>OB Lineouts — Old Belvedere Juniors</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {

    --bg:           #0f0f0f;

    --surface:      #1a1a1a;

    --card:         #222222;

    --border:       #2e2e2e;

    --text:         #f0f0f0;

    --muted:        #888;

    --won:          #4caf6e;

    --lost:         #e05555;

    --radius:       10px;

    --font-display: 'Bebas Neue', sans-serif;

    --font-body:    'DM Sans', sans-serif;

  }

  html, body {

    background: var(--bg);

    color: var(--text);

    font-family: var(--font-body);

    font-size: 14px;

    min-height: 100vh;

    -webkit-text-size-adjust: 100%;

  }

  .shell {

    max-width: 1400px;

    margin: 0 auto;

    padding: 24px 16px 80px;

  }

  /* ── Header ─────────────────────────────────── */

  header { text-align: center; margin-bottom: 28px; }

  header h1 {

    font-family: var(--font-display);

    font-size: clamp(32px, 8vw, 72px);

    letter-spacing: 0.04em;

    line-height: 1;

    color: #fff;

  }

  header p {

    margin-top: 6px;

    color: var(--muted);

    font-size: clamp(10px, 2.5vw, 13px);

    letter-spacing: 0.12em;

    text-transform: uppercase;

  }

  .header-rule {

    height: 2px;

    background: linear-gradient(90deg, transparent, var(--border), transparent);

    margin: 20px 0;

  }

  /* ── Unified grid: selector + table share the same column ── */

  /* .selectors is now REMOVED — selectors live inside .main-grid */

  .selectors { display: contents; } /* dissolve into parent grid */

  .selector-card {

    background: var(--card);

    border-radius: var(--radius);

    padding: 12px 14px;

    display: flex;

    align-items: center;

    gap: 10px;

    border-left: 4px solid var(--border);

    transition: border-color 0.2s;

    min-width: 0;

  }

  .selector-logo {

    width: 36px; height: 36px;

    object-fit: contain;

    border-radius: 5px;

    background: rgba(255,255,255,0.06);

    flex-shrink: 0;

  }

  .no-logo {

    width: 36px; height: 36px;

    border-radius: 5px;

    background: var(--border);

    flex-shrink: 0;

  }

  .selector-inner { flex: 1; min-width: 0; }

  .selector-inner label {

    display: block;

    font-size: 9px;

    letter-spacing: 0.1em;

    text-transform: uppercase;

    color: var(--muted);

    margin-bottom: 2px;

  }

  .selector-inner select {

    background: transparent;

    border: none;

    color: #fff;

    font-family: var(--font-display);

    font-size: clamp(16px, 4vw, 22px);

    letter-spacing: 0.03em;

    cursor: pointer;

    outline: none;

    width: 100%;

    appearance: none;

    -webkit-appearance: none;

    white-space: nowrap;

    overflow: hidden;

    text-overflow: ellipsis;

  }

  .selector-inner select option {

    background: #1a1a1a;

    color: #fff;

    font-family: var(--font-body);

    font-size: 14px;

  }

  /* ── Tabs (mobile only) ─────────────────────── */

  .tab-bar {

    display: none;

    border-radius: var(--radius);

    overflow: hidden;

    margin-bottom: 16px;

    background: var(--card);

  }

  .tab-bar button {

    flex: 1;

    padding: 12px 8px;

    background: transparent;

    border: none;

    color: var(--muted);

    font-family: var(--font-display);

    font-size: 16px;

    letter-spacing: 0.05em;

    cursor: pointer;

    transition: background 0.15s, color 0.15s;

    border-bottom: 3px solid transparent;

  }

  .tab-bar button.active {

    color: #fff;

  }

  /* ── Main grid: 2 columns, selectors on row 1, tables on row 2 ── */

  .main-grid {

    display: grid;

    grid-template-columns: 1fr 1fr;

    grid-template-rows: auto auto;

    column-gap: 20px;

    row-gap: 12px;

    margin-bottom: 32px;

  }

  /* Selectors sit in row 1 */

  .selector-card { grid-row: 1; }

  /* Panels sit in row 2 */

  .panel { grid-row: 2; display: flex; flex-direction: column; gap: 10px; }

  /* ── Table card ─────────────────────────────── */

  .table-card {

    background: var(--card);

    border-radius: var(--radius);

    overflow: hidden;

    box-shadow: 0 4px 20px rgba(0,0,0,0.4);

    border-top: 3px solid var(--border);

  }

  .table-header {

    display: flex;

    align-items: center;

    gap: 10px;

    padding: 10px 14px;

  }

  .table-header .th-logo {

    width: 32px; height: 32px;

    object-fit: contain;

    border-radius: 4px;

    background: rgba(255,255,255,0.08);

    flex-shrink: 0;

  }

  .table-header span {

    font-family: var(--font-display);

    font-size: clamp(16px, 3vw, 20px);

    letter-spacing: 0.05em;

    color: #fff;

    white-space: nowrap;

    overflow: hidden;

    text-overflow: ellipsis;

  }

  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }

  thead th {

    padding: 7px 10px;

    text-align: left;

    font-family: var(--font-body);

    font-weight: 600;

    font-size: 10px;

    letter-spacing: 0.06em;

    text-transform: uppercase;

    white-space: nowrap;

    background: rgba(255,255,255,0.04);

    color: var(--muted);

    border-bottom: 1px solid var(--border);

  }

  tbody tr { transition: background 0.1s; }

  tbody tr:hover { background: rgba(255,255,255,0.04); }

  tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }

  tbody td {

    padding: 6px 10px;

    white-space: nowrap;

    border-bottom: 1px solid rgba(255,255,255,0.04);

    color: #ccc;

  }

  .won  { color: var(--won);  font-weight: 600; }

  .lost { color: var(--lost); font-weight: 600; }

  .empty-row td {

    text-align: center;

    color: var(--muted);

    padding: 24px !important;

    font-style: italic;

  }

  /* ── Metrics ────────────────────────────────── */

  .metrics {

    display: grid;

    grid-template-columns: repeat(3, 1fr);

    gap: 8px;

  }

  .metric {

    background: var(--surface);

    border-radius: var(--radius);

    padding: 12px 6px;

    text-align: center;

    border-top: 3px solid var(--border);

    transition: border-color 0.2s;

  }

  .metric-label {

    font-size: 9px;

    letter-spacing: 0.07em;

    text-transform: uppercase;

    color: var(--muted);

    margin-bottom: 4px;

  }

  .metric-value {

    font-family: var(--font-display);

    font-size: clamp(20px, 3.5vw, 28px);

    letter-spacing: 0.02em;

    color: #fff;

    line-height: 1;

  }

  /* ── Pitch ──────────────────────────────────── */

  .section-title {

    font-family: var(--font-display);

    font-size: clamp(22px, 5vw, 30px);

    letter-spacing: 0.06em;

    color: #fff;

    margin-bottom: 14px;

  }

  .pitch-section {

    background: var(--surface);

    border-radius: var(--radius);

    padding: 16px;

    box-shadow: 0 4px 20px rgba(0,0,0,0.4);

  }

  #pitch { width: 100%; }

  /* ════════════════════════════════════════════

     MOBILE  (≤ 640px)

  ════════════════════════════════════════════ */

  @media (max-width: 640px) {

    .shell { padding: 16px 12px 60px; }

    /* Grid collapses: selectors stack, then panels below */

    .main-grid {

      grid-template-columns: 1fr;

      grid-template-rows: auto auto auto auto;

      row-gap: 10px;

    }

    /* Both selectors occupy their natural column-1 position */

    .selector-card { grid-row: auto; }

    /* Show tab bar */

    .tab-bar { display: flex; }

    /* Panels: hidden by default, shown when active */

    .panel { grid-row: auto; display: none; }

    .panel.active { display: flex; }

    .metric-value { font-size: 22px; }

    .metric-label { font-size: 8px; }

    .pitch-section { padding: 10px; }

  }

  /* ════════════════════════════════════════════

     TABLET  (641–1023px)

  ════════════════════════════════════════════ */

  @media (min-width: 641px) and (max-width: 1023px) {

    .main-grid { column-gap: 14px; }

    .metric-value { font-size: 22px; }

  }
</style>
</head>
<body>

<header>
<h1>🏉 Old Belvedere Juniors</h1>

<div class="header-rule"></div>

<div class="tab-bar" id="tab-bar">

<div class="main-grid">

</div>

<div class="header-rule"></div>

<script>

// ─────────────────────────────────────────────────────

// CONFIG — replace SHEET_ID with your Google Sheet ID

// ─────────────────────────────────────────────────────

const SHEET_URL = "https://docs.google.com/spreadsheets/d/SHEET_ID/export?format=csv&gid=0";

const STYLERS = {

  "Old Belvedere J2": { logo: "https://www.thefrontrowunion.com/wp-content/uploads/2020/09/Old-Belvedere-Crest.png", color: "#000000" },

  "Old Wesley":       { logo: "https://www.oldwesley.ie/wp-content/uploads/2019/11/Old-Wesley-Crest.png",           color: "#FF0000" },

  "St.Mary's":        { logo: "https://www.oldwesley.ie/wp-content/uploads/2019/11/St-Marys-RFC-Crest.png",         color: "#307FC6" },

  "Terenure":         { logo: "https://alchetron.com/cdn/terenure-college-rfc-32198669-fd32-44f2-bf6e-03443236188-resize-750.jpeg", color: "#ba55d3" },

  "Naas":             { logo: "https://clubs.clubforce.com/wp/wp-content/uploads/2018/10/Naas-RFC-Logo-b.jpg",      color: "#3F9925" },

};

const VIEW_COLS = ["Call","Movement","Outcome","Clean","Play","Receiver","Defended","Defender","Personnel"];

let allData = [];

// ─────────────────────────────────────────────────────

// Mobile tabs

// ─────────────────────────────────────────────────────

document.querySelectorAll(".tab-bar button").forEach(btn => {

  btn.addEventListener("click", () => {

    document.querySelectorAll(".tab-bar button").forEach(b => b.classList.remove("active"));

    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));

    btn.classList.add("active");

    document.getElementById(btn.dataset.tab).classList.add("active");

  });

});

// ─────────────────────────────────────────────────────

// Helpers

// ─────────────────────────────────────────────────────

const getCfg = t => STYLERS[t] || { logo: "", color: "#555" };

function modeCall(rows) {

  if (!rows.length) return "N/A";

  const freq = {};

  rows.forEach(r => { freq[r.Call] = (freq[r.Call] || 0) + 1; });

  return Object.entries(freq).sort((a, b) => b[1] - a[1])[0][0];

}

const pct = (rows, fn) => rows.length ? (fn(rows) / rows.length * 100).toFixed(1) + "%" : "—";

const successRate  = rows => pct(rows, r => r.filter(x => x.Outcome === "Won").length);

const defendedRate = rows => pct(rows, r => r.filter(x => x.Defended === "Y").length);

function setLogo(wrapId, url, size) {

  const el = document.getElementById(wrapId);

  if (!el) return;

  if (url) {

    const img = document.createElement("img");

    img.src = url; img.className = "selector-logo";

    img.style.cssText = `width:${size}px;height:${size}px`;

    img.onerror = () => img.replaceWith(makePlaceholder(size));

    el.replaceWith(img);
img.id = wrapId;

  }

}

function makePlaceholder(size) {

  const d = document.createElement("div");

  d.className = "no-logo";

  d.style.cssText = `width:${size}px;height:${size}px`;

  return d;

}

function setTableHeader(headerId, cardId, url, title, color) {

  const header = document.getElementById(headerId);

  const card   = document.getElementById(cardId);

  if (!header || !card) return;

  card.style.borderTopColor = color;

  const logoEl = url

    ? `<img class="th-logo" src="${url}" onerror="this.style.display='none'" style="width:32px;height:32px;object-fit:contain;border-radius:4px;background:rgba(255,255,255,0.08);flex-shrink:0">`

    : `<div style="width:32px;height:32px;border-radius:4px;background:rgba(255,255,255,0.1);flex-shrink:0"></div>`;

  header.innerHTML = `${logoEl}<span style="font-family:'Bebas Neue',sans-serif;font-size:clamp(16px,3vw,20px);letter-spacing:0.05em;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${title}</span>`;

}

function updateTabLabels(teamName, oppName) {

  const t = document.getElementById("tab-team");

  const o = document.getElementById("tab-opp");

  if (t) t.textContent = "Our Throw";

  if (o) o.textContent = oppName;

}

function renderTable(theadId, tbodyId, rows) {

  document.getElementById(theadId).innerHTML =

    `<tr>${VIEW_COLS.map(c => `<th>${c}</th>`).join("")}</tr>`;

  document.getElementById(tbodyId).innerHTML = rows.length

    ? rows.map(r => `<tr>${VIEW_COLS.map(c => {

        const v = r[c] ?? "";

        return c === "Outcome"

          ? `<td class="${v === "Won" ? "won" : "lost"}">${v}</td>`

          : `<td>${v}</td>`;

      }).join("")}</tr>`).join("")

    : `<tr class="empty-row"><td colspan="${VIEW_COLS.length}">No data for this fixture</td></tr>`;

}

function renderMetrics(containerId, rows, color) {

  const stats = [

    { label:"Top Call",     value: modeCall(rows) },

    { label:"Success Rate", value: pct(rows, r => r.filter(x => x.Outcome === "Won").length) },

    { label:"Defended",     value: pct(rows, r => r.filter(x => x.Defended === "Y").length) },

  ];

  document.getElementById(containerId).innerHTML = stats.map(s => `
<div class="metric" style="border-top-color:${color}">
<div class="metric-label">${s.label}</div>
<div class="metric-value">${s.value}</div>
</div>`).join("");

}

function renderPitch(teamRows, oppRows, teamName, oppName, teamColor, oppColor) {

  const isMobile = window.innerWidth <= 640;

  const PITCH_LEN = 100, PITCH_WID = 70;

  const traces = [];

  for (const [rows, color, name] of [[teamRows, teamColor, teamName], [oppRows, oppColor, oppName]]) {

    for (const [outcome, symbol] of [["Won","circle"],["Lost","x"]]) {

      const s = rows.filter(r => r.Outcome === outcome);

      if (!s.length) continue;

      // Map Side: "0" = Near (bottom of pitch, y=5), "70" = Far (top, y=65)

      // Add small random jitter so overlapping markers don't stack invisibly

      const mapSide = v => {

        const base = String(v).trim() === "0" ? 12 : 58;

        return base + (Math.random() - 0.5) * 6;

      };

      traces.push({

        x: s.map(r => +r["Distance to Opponent Tryline"]),

        y: s.map(r => mapSide(r["Side"])),

        mode: "markers",

        cliponaxis: false,

        type: "scatter",

        marker: { size: isMobile ? 11 : 14, color, symbol, opacity: 0.92, line: { color:"white", width: 1.5 } },

        name: `${name} — ${outcome}`,

        customdata: s.map(r => [r.Call||"—", r.Play||"—", r.Receiver||"—"]),

        hovertemplate: "<b>%{customdata[0]}</b><br>%{x}m · %{customdata[1]}<br>%{customdata[2]}<extra></extra>",

      });

    }

  }

  const shapes = [

    { type:"rect", x0:0, y0:0, x1:PITCH_LEN, y1:PITCH_WID, fillcolor:"#3a8a3a", line:{width:0}, layer:"below" },

    { type:"rect", x0:0,  y0:0, x1:5,   y1:PITCH_WID, fillcolor:"#2d7030", line:{width:0}, layer:"below" },

    { type:"rect", x0:95, y0:0, x1:100, y1:PITCH_WID, fillcolor:"#2d7030", line:{width:0}, layer:"below" },

    ...[0,100].map(x => ({ type:"line", x0:x, y0:0, x1:x, y1:PITCH_WID, line:{color:"white",width:2.5}, layer:"below" })),

    ...[5,22,50,78,95].map(x => ({ type:"line", x0:x, y0:0, x1:x, y1:PITCH_WID, line:{color:"rgba(255,255,255,0.4)",width:1.5,dash:"dash"}, layer:"below" })),

  ];

  const annotations = isMobile

    ? [50].map(x => ({ x, y: PITCH_WID+2, text:`${x}m`, showarrow:false, font:{color:"white",size:10,family:"Bebas Neue"}, xanchor:"center" }))

    : [5,22,50,78,95].map(x => ({ x, y: PITCH_WID+2, text:`${x}m`, showarrow:false, font:{color:"white",size:11,family:"Bebas Neue"}, xanchor:"center" }));

  Plotly.newPlot("pitch", traces, {

    shapes, annotations,

    font: { family:"Bebas Neue, sans-serif" },

    paper_bgcolor: "#1a1a1a",

    plot_bgcolor: "#3a8a3a",

    legend: {

      orientation:"h", yanchor:"bottom", y: 1.05,

      xanchor:"center", x:0.5,

      bgcolor:"rgba(0,0,0,0)",

      font:{ color:"white", size: isMobile ? 11 : 13 },

    },

    xaxis: {

      range:[-2,102], showgrid:false, zeroline:false,

      title:{ text:"Distance to Opponent Try Line (m)", font:{color:"white",size:11}, standoff:8 },

      tickfont:{ color:"white", size: isMobile ? 10 : 12 },

    },

    yaxis: {

      range:[0, 70], showgrid:false, zeroline:false,

      tickvals:[12, 58], ticktext:["Near","Far"],

      tickfont:{ color:"white", size: isMobile ? 10 : 12 },

    },

    margin: isMobile

      ? { t:20, b:60, l:44, r:10 }

      : { t:20, b:60, l:60, r:20 },

    height: isMobile ? 280 : 400,

  }, { responsive:true, displayModeBar:false, scrollZoom:false });

}

// ─────────────────────────────────────────────────────

// Main render

// ─────────────────────────────────────────────────────

function render() {

  const selectedTeam = document.getElementById("team-select").value;

  const selectedOpp  = document.getElementById("opp-select").value;

  const teamCfg = getCfg(selectedTeam);

  const oppCfg  = getCfg(selectedOpp);

  document.getElementById("team-card").style.borderLeftColor = teamCfg.color;

  document.getElementById("opp-card").style.borderLeftColor  = oppCfg.color;

  setLogo("team-logo-wrap", teamCfg.logo, 36);

  setLogo("opp-logo-wrap",  oppCfg.logo,  36);

  setTableHeader("team-table-header", "team-table-card", teamCfg.logo, selectedTeam, teamCfg.color);

  setTableHeader("opp-table-header",  "opp-table-card",  oppCfg.logo,  selectedOpp,  oppCfg.color);

  updateTabLabels(selectedTeam, selectedOpp);

  const fixture = allData.filter(r => r.Team === selectedTeam && r.Opponent === selectedOpp);

  const teamRows = fixture.filter(r => r["Throw In"] === "Old Belvedere");

  const oppRows  = fixture.filter(r => r["Throw In"] === selectedOpp);

  renderTable("team-thead", "team-tbody", teamRows);

  renderTable("opp-thead",  "opp-tbody",  oppRows);

  renderMetrics("team-metrics", teamRows, teamCfg.color);

  renderMetrics("opp-metrics",  oppRows,  oppCfg.color);

  renderPitch(teamRows, oppRows, selectedTeam, selectedOpp, teamCfg.color, oppCfg.color);

}

// ─────────────────────────────────────────────────────

// Re-render pitch on resize (handles orientation change)

// ─────────────────────────────────────────────────────

let resizeTimer;

window.addEventListener("resize", () => {

  clearTimeout(resizeTimer);

  resizeTimer = setTimeout(render, 200);

});

// ─────────────────────────────────────────────────────

// Populate selects

// ─────────────────────────────────────────────────────

function populateSelects() {

  const known = new Set(Object.keys(STYLERS));

  const teams     = [...new Set(allData.map(r => r.Team))    ].filter(t => known.has(t)).sort();

  const opponents = [...new Set(allData.map(r => r.Opponent))].filter(t => known.has(t)).sort();

  const ts = document.getElementById("team-select");

  const os = document.getElementById("opp-select");

  ts.innerHTML = teams.map(t     => `<option value="${t}">${t}</option>`).join("");

  os.innerHTML = opponents.map(t => `<option value="${t}">${t}</option>`).join("");

  ts.addEventListener("change", render);

  os.addEventListener("change", render);

  render();

}

// ─────────────────────────────────────────────────────

// Sample data fallback

// ─────────────────────────────────────────────────────
